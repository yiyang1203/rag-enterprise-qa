# 应用配置

# ── 嵌入模型 ──────────────────────────────────────────
embedding:
  backend: openai                # openai | huggingface
  openai:
    model: text-embedding-3-small
    api_key: ${OPENAI_API_KEY}   # 从环境变量读取
    base_url: ${OPENAI_BASE_URL}  # 可选，自定义端点
    dimensions: null             # null = 使用模型原生维度
    batch_size: 100
    max_retries: 3
  huggingface:
    model_name: BAAI/bge-small-zh-v1.5
    device: null                 # null = 自动选择
    normalize: true
    batch_size: 32

# ── LLM 生成模型 ──────────────────────────────────────
llm:
  backend: openai                # openai | qianfan | dashscope | vllm
  openai:
    model: gpt-4o-mini
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_BASE_URL}
    temperature: 0.0
    max_tokens: 2048
    timeout: 60
    max_retries: 3
  qianfan:                       # 百度文心
    model: ernie-speed-128k
    api_key: ${QIANFAN_ACCESS_KEY}
    secret_key: ${QIANFAN_SECRET_KEY}
    temperature: 0.0
    max_output_tokens: 2048
    timeout: 60
    max_retries: 3
  dashscope:                     # 阿里通义千问
    model: qwen-plus
    api_key: ${DASHSCOPE_API_KEY}
    temperature: 0.0
    max_tokens: 2048
    timeout: 60
    max_retries: 3
  vllm:                          # 本地 vLLM
    base_url: http://localhost:8000/v1
    model: null                  # vLLM 服务端已指定
    temperature: 0.0
    max_tokens: 2048
    timeout: 120
    max_retries: 3

# ── 向量存储 ──────────────────────────────────────────
vector_store:
  backend: chroma                # chroma | faiss
  persist_dir: data/vector_store
  collection_name: rag_enterprise_qa
  index_path: data/vector_store/faiss_index

# ── 检索参数 ──────────────────────────────────────────
retrieval:
  top_k: 5
  score_threshold: null          # null = 不过滤低分结果

# ── 分块参数 ──────────────────────────────────────────
chunking:
  chunk_size: 500
  chunk_overlap: 50

# ── Token 限制 ────────────────────────────────────────
token_limits:
  max_context_tokens: 6000       # 提示词中上下文的最大 token 数
  encoding_model: cl100k_base    # tiktoken encoding（用于 OpenAI 模型）
  chars_per_token_estimate: 2.5  # 当 tiktoken 不可用时，用字符数/此值估算
